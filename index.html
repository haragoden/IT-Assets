<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asset Information | Dale Carnegie</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root {
            --dc-blue: #002b5c;
            --dc-gray: #f8f9fa;
        }
        body {
            background-color: var(--dc-gray);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            -webkit-font-smoothing: antialiased;
        }
        .header-brand {
            background-color: var(--dc-blue);
            color: white;
            padding: 1.5rem 0;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            border-bottom: 4px solid #0056b3;
        }
        .header-brand h1 {
            font-size: 1.5rem;
            margin: 0;
            font-weight: 600;
            letter-spacing: 1px;
        }
        .asset-card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.08);
            margin-top: -20px;
            position: relative;
            z-index: 10;
            padding: 2rem;
            border: none;
            overflow: hidden;
        }
        .asset-icon-box {
            width: 80px;
            height: 80px;
            background: var(--dc-blue);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.2rem;
            margin: 0 auto 1.5rem auto;
            box-shadow: 0 4px 12px rgba(0,43,92,0.3);
            border: 4px solid white;
        }
        .asset-title {
            text-align: center;
            color: var(--dc-blue);
            font-weight: 700;
            margin-bottom: 0.2rem;
        }
        .asset-subtitle {
            text-align: center;
            color: #6c757d;
            font-size: 0.95rem;
            margin-bottom: 2rem;
        }
        .info-row {
            display: flex;
            padding: 1rem 0;
            border-bottom: 1px solid #edf2f7;
        }
        .info-row:last-child {
            border-bottom: none;
        }
        .info-label {
            flex: 0 0 40%;
            color: #64748b;
            font-size: 0.9rem;
            font-weight: 600;
        }
        .info-value {
            flex: 1;
            color: #0f172a;
            font-weight: 500;
            text-align: right;
        }
        .status-badge {
            background-color: #dcfce7;
            color: #166534;
            padding: 0.35rem 0.8rem;
            border-radius: 50rem;
            font-size: 0.85rem;
            font-weight: 600;
            display: inline-block;
        }
        .status-maintenance {
            background-color: #fef08a;
            color: #854d0e;
        }
        .status-dead {
            background-color: #fee2e2;
            color: #991b1b;
        }
        .footer {
            text-align: center;
            padding: 2rem;
            color: #94a3b8;
            font-size: 0.85rem;
        }
        .not-found {
            text-align: center;
            padding: 3rem 1rem;
        }
        .not-found i {
            font-size: 4rem;
            color: #cbd5e1;
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>

    <div class="header-brand">
        <div class="container">
            <h1><i class="bi bi-qr-code-scan me-2"></i> IT Asset System</h1>
        </div>
    </div>

    <div class="container pb-5">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6">
                <div class="asset-card" id="cardContent">
                    <!-- Javascript will inject content here -->
                    <div class="text-center">
                        <div class="spinner-border text-primary" role="status">
                            <span class="visually-hidden">Loading...</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="footer">
        &copy; 2026 Dale Carnegie Indonesia - IT Department
    </div>

    <!-- Load the Database Generated by Python -->
    <script src="db.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const urlParams = new URLSearchParams(window.location.search);
            const rawId = urlParams.get('id');
            const cardContent = document.getElementById('cardContent');

            if (!rawId) {
                showError("No Asset ID Provided");
                return;
            }

            // Strip input parameters just in case
            const id = rawId.trim();

            if (typeof assetDB === 'undefined') {
                showError("Database not found or could not be loaded.");
                return;
            }

            const asset = assetDB[id];

            if (!asset) {
                showError(`Asset ID <strong>${id}</strong> not found in database.`);
                return;
            }

            renderAsset(asset, id);
        });

        function getIconForCategory(category) {
            const cat = (category || "").toLowerCase();
            if (cat.includes('laptop')) return 'bi-laptop';
            if (cat.includes('printer')) return 'bi-printer';
            if (cat.includes('projector')) return 'bi-projector';
            if (cat.includes('webcam') || cat.includes('camera')) return 'bi-camera-video';
            if (cat.includes('router') || cat.includes('adaptor') || cat.includes('cable') || cat.includes('usb') || cat.includes('splitter')) return 'bi-router';
            if (cat.includes('microphone')) return 'bi-mic';
            return 'bi-box-seam';
        }

        function getStatusClass(status) {
            const stat = (status || "").toLowerCase();
            if (stat.includes('maintenance')) return 'status-maintenance';
            if (stat.includes('dead') || stat.includes('lost')) return 'status-dead';
            return 'status-badge'; // default green
        }

        function renderAsset(asset, id) {
            let html = '';
            
            const category = asset['Kategori'] || 'Unknown';
            const iconClass = getIconForCategory(category);
            
            html += `
                <div class="asset-icon-box">
                    <i class="bi ${iconClass}"></i>
                </div>
                <h2 class="asset-title">${asset['Nama Perangkat'] || 'Unknown Device'}</h2>
                <p class="asset-subtitle">${id}</p>
            `;

            const status = asset['Status'] || '-';
            const statusUi = `<span class="${getStatusClass(status)}">${status}</span>`;

            // Setup the rows
            const rows = [
                { label: 'Kategori', value: asset['Kategori'] },
                { label: 'Merek & Model', value: asset['Merek & Model'] },
                { label: 'Serial Number', value: asset['Serial Number (S/N)'] },
                { label: 'Spesifikasi', value: asset['Spesifikasi Utama (CPU/RAM/SSD)'] },
                { label: 'User / PIC', value: asset['User / Penanggung Jawab'] },
                { label: 'Departemen', value: asset['Departemen'] },
                { label: 'Tanggal Beli', value: asset['Tanggal Beli'] },
                { label: 'Status', value: statusUi },
                { label: 'Keterangan', value: asset['Keterangan'] }
            ];

            rows.forEach(r => {
                if (r.value && r.value.trim() !== '') {
                    html += `
                        <div class="info-row">
                            <div class="info-label">${r.label}</div>
                            <div class="info-value">${r.value}</div>
                        </div>
                    `;
                }
            });

            document.getElementById('cardContent').innerHTML = html;
        }

        function showError(msg) {
            document.getElementById('cardContent').innerHTML = `
                <div class="not-found">
                    <i class="bi bi-exclamation-triangle"></i>
                    <h4>Asset Not Found</h4>
                    <p class="text-muted mt-2">${msg}</p>
                    <a href="#" onclick="window.location.reload(); return false;" class="btn btn-primary mt-3">Try Again</a>
                </div>
            `;
        }
    </script>
</body>
</html>
